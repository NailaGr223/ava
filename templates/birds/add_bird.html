{% extends 'base.html' %}

{% block title %}List New Item - Avian Haven{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4>List New Item</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        {{ field.label_tag }}
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <!-- Listing Type Field -->
                    <div class="mb-3">
    <label class="form-label fw-bold">Listing Type</label>
    <select name="listing_type" class="form-select" required>
        <option value="sell">For Sale</option>
        <option value="rehome">Rehoming</option>
        <option value="adopt">Adoption</option>
        <option value="food">Bird Food & Supplies</option>
    </select>
</div>

                    <button type="submit" class="btn btn-success w-100 py-3 fw-bold">List This Item</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
