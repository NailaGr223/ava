<div class="col-md-4 col-lg-3 mb-4">
    <div class="card h-100 shadow-sm hover-card">
        {% if bird.image %}
            <img src="{{ bird.image.url }}" class="card-img-top" style="height: 200px; object-fit: cover;" alt="{{ bird.title }}">
        {% endif %}
        <div class="card-body">
            <span class="badge bg-success mb-2">{{ bird.get_listing_type_display }}</span>
            <h5 class="card-title">{{ bird.title }}</h5>
            <p class="text-muted small">{{ bird.breed|default:"—" }} • {{ bird.location }}</p>
            {% if bird.price %}
                <p class="fs-5 fw-bold text-success">KSh {{ bird.price }}</p>
            {% endif %}
        </div>
        <div class="card-footer">
            <a href="{% url 'bird_detail' bird.id %}" class="btn btn-success btn-sm w-100">View Details</a>
        </div>
    </div>
</div>
