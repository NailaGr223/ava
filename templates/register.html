{% extends 'base.html' %}

{% block title %}Create Account - Avian Haven{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center py-3">
                <h4>Join Avian Haven</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">I want to join as:</label>
                        <select name="role" class="form-select" required>
                            <option value="buyer">Buyer - Looking for birds</option>
                            <option value="seller">Seller - Selling birds</option>
                            <option value="vet">Veterinarian - Offering services</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2">Create My Account</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
